<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CR-A3">
<meta name="theme-color" content="#0a0a0f">
<title>CR-A3 · PGP BL07 Term I</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0f5;
  --muted: #6b6b80;
  --dim: #3a3a4a;

  --cft:   #7c6af5;
  --ome:   #f5856a;
  --dam:   #5aafea;
  --mppo:  #f07ab5;
  --mm:    #f5c46a;
  --efaac: #6ad89a;
  --fob:   #a0a0b8;
  --exam:  #f56a6a;
  --ws:    #a78bfa;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── NOISE TEXTURE ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

.app { position: relative; z-index: 1; max-width: 430px; margin: 0 auto; padding: 0 0 6rem; }

/* ── HEADER ── */
header {
  padding: 3rem 1.25rem 1.5rem;
  position: sticky;
  top: 0;
  background: linear-gradient(to bottom, var(--bg) 80%, transparent);
  z-index: 10;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 1.25rem;
}

.tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
  border: 1px solid var(--border2);
  padding: 4px 8px;
  border-radius: 4px;
}

.class-badge {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--cft);
  border: 1px solid rgba(124,106,245,0.3);
  padding: 4px 10px;
  border-radius: 4px;
  background: rgba(124,106,245,0.08);
}

.date-display {
  margin-bottom: 1rem;
}

.date-day {
  font-size: 42px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -0.03em;
  color: var(--text);
}

.date-month {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--muted);
  margin-top: 4px;
  letter-spacing: 0.05em;
}

/* ── DAY NAV ── */
.day-nav {
  display: flex;
  gap: 6px;
  align-items: center;
}

.nav-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 16px;
  width: 40px;
  height: 36px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.nav-btn:active { background: var(--surface2); transform: scale(0.96); }

.today-btn {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  height: 36px;
  border-radius: 8px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.15s;
}
.today-btn:active { background: var(--surface2); color: var(--text); }

/* ── STATS ROW ── */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  padding: 0 1.25rem;
  margin-bottom: 1.5rem;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 10px;
  text-align: center;
}

.stat-val {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1;
}

.stat-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 4px;
}

/* ── SCHEDULE LIST ── */
.schedule { padding: 0 1.25rem; }

.section-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 0.75rem;
}

.slot {
  display: flex;
  gap: 12px;
  margin-bottom: 8px;
  align-items: stretch;
}

.time-col {
  width: 68px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  padding-top: 14px;
}

.time-start {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  line-height: 1;
}

.time-end {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  margin-top: 3px;
  line-height: 1;
}

.class-card {
  flex: 1;
  border-radius: 12px;
  padding: 12px 14px;
  border-left: 3px solid transparent;
  position: relative;
  overflow: hidden;
  animation: slideIn 0.25s ease forwards;
}

.class-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: currentColor;
  opacity: 0.06;
  pointer-events: none;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(8px); }
  to   { opacity: 1; transform: translateX(0); }
}

.class-code {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.01em;
  line-height: 1;
}

.class-full {
  font-size: 11px;
  margin-top: 4px;
  opacity: 0.65;
  line-height: 1.3;
}

.class-prof {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  margin-top: 5px;
  opacity: 0.5;
}

.lunch-card {
  flex: 1;
  border-radius: 12px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px dashed var(--border2);
  display: flex;
  align-items: center;
  gap: 8px;
}

.lunch-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--dim);
}

.lunch-text {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.05em;
}

.workshop-card {
  flex: 1;
  border-radius: 12px;
  padding: 12px 14px;
  background: rgba(167,139,250,0.08);
  border-left: 3px solid var(--ws);
}

.workshop-code {
  font-size: 12px;
  font-weight: 700;
  color: var(--ws);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.workshop-title {
  font-size: 12px;
  color: rgba(167,139,250,0.8);
  margin-top: 4px;
  line-height: 1.3;
}

.workshop-sub {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: rgba(167,139,250,0.5);
  margin-top: 5px;
}

.exam-card {
  flex: 1;
  border-radius: 12px;
  padding: 14px 16px;
  background: rgba(245,106,106,0.1);
  border-left: 3px solid var(--exam);
  border: 1px solid rgba(245,106,106,0.2);
}

.exam-text {
  font-size: 15px;
  font-weight: 700;
  color: var(--exam);
}

.exam-sub {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: rgba(245,106,106,0.5);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.no-class {
  text-align: center;
  padding: 3rem 0;
}

.no-class-icon {
  font-size: 32px;
  margin-bottom: 0.75rem;
  opacity: 0.4;
}

.no-class-text {
  font-size: 14px;
  color: var(--muted);
}

.no-class-sub {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--dim);
  margin-top: 6px;
  letter-spacing: 0.05em;
}

/* ── LEGEND ── */
.legend {
  padding: 1.5rem 1.25rem 0;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.leg {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 9px;
}

.leg-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
}

.leg-text {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
}

/* ── PROGRESS BAR ── */
.progress-wrap {
  padding: 0 1.25rem;
  margin-bottom: 1.5rem;
}

.progress-label {
  display: flex;
  justify-content: space-between;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 6px;
}

.progress-track {
  height: 3px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cft), var(--ws));
  border-radius: 2px;
  transition: width 0.5s ease;
}

/* ── CURRENT CLASS HIGHLIGHT ── */
.now-badge {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  background: rgba(124,106,245,0.15);
  color: var(--cft);
  border: 1px solid rgba(124,106,245,0.3);
  padding: 2px 7px;
  border-radius: 4px;
  text-transform: uppercase;
  position: absolute;
  top: 10px;
  right: 10px;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.slot-anim-0 { animation-delay: 0.00s; }
.slot-anim-1 { animation-delay: 0.04s; }
.slot-anim-2 { animation-delay: 0.08s; }
.slot-anim-3 { animation-delay: 0.12s; }
.slot-anim-4 { animation-delay: 0.16s; }
.slot-anim-5 { animation-delay: 0.20s; }
.slot-anim-6 { animation-delay: 0.24s; }
.slot-anim-7 { animation-delay: 0.28s; }
</style>
</head>

const MAP = {};
SCHEDULE.forEach(d => MAP[d.d] = d.slots);
const DATES = SCHEDULE.map(d => d.d);
const TERM_START = '2026-04-22';
const TERM_END   = '2026-06-05';

let idx = 0;

function toDateStr(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function parseTime(t) {
  const [h, m] = t.split('.').map(Number);
  return h * 60 + m;
}

function isNowInSlot(t) {
  if (t === 'All day') return true;
  const parts = t.split('-');
  if (parts.length < 2) return false;
  const now = new Date();
  const cur = now.getHours() * 60 + now.getMinutes();
  const start = parseTime(parts[0].trim());
  const end   = parseTime(parts[1].trim());
  return cur >= start && cur <= end;
}

function getCode(c) {
  if (!c || c.startsWith('__')) return null;
  return c.split('-')[0].split('(')[0].trim();
}

function findTodayIdx() {
  const today = toDateStr(new Date());
  let i = DATES.findIndex(d => d >= today);
  return i === -1 ? DATES.length - 1 : i;
}

function termProgress() {
  const now = Date.now();
  const start = new Date(TERM_START).getTime();
  const end   = new Date(TERM_END).getTime();
  return Math.max(0, Math.min(100, Math.round((now - start) / (end - start) * 100)));
}

function daysLeft() {
  const today = new Date(); today.setHours(0,0,0,0);
  const end = new Date(TERM_END); end.setHours(0,0,0,0);
  const diff = Math.ceil((end - today) / 86400000);
  return Math.max(0, diff);
}

function countHours(slots) {
  let mins = 0;
  slots.forEach(s => {
    if (s.c === '__LUNCH__' || s.c.startsWith('__')) return;
    const parts = s.t.split('-');
    if (parts.length < 2) return;
    try {
      mins += parseTime(parts[1].trim()) - parseTime(parts[0].trim());
    } catch(e) {}
  });
  return (mins / 60).toFixed(1);
}

function render() {
  const dateStr = DATES[idx];
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  document.getElementById('date-day').textContent = `${DAYS[dt.getDay()]}, ${d}`;
  document.getElementById('date-month').textContent = `${MONTHS[m-1].toUpperCase()} ${y}`;

  const pct = termProgress();
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  const slots = MAP[dateStr] || [];
  const classes = slots.filter(s => !s.c.startsWith('__')).length;
  const hrs = countHours(slots);
  const left = daysLeft();

  document.getElementById('stat-classes').textContent = classes;
  document.getElementById('stat-hours').textContent = hrs;
  document.getElementById('stat-days').textContent = left;

  if (slots.length === 0) {
    document.getElementById('schedule-body').innerHTML = `
      <div class="no-class">
        <div class="no-class-icon">◎</div>
        <div class="no-class-text">No classes today</div>
        <div class="no-class-sub">Free day · rest or revise</div>
      </div>`;
    return;
  }

  let html = '';
  slots.forEach((slot, i) => {
    const timeParts = slot.t.split('-');
    const t1 = timeParts[0] ? timeParts[0].trim() : slot.t;
    const t2 = timeParts[1] ? timeParts[1].trim() : '';
    const anim = `slot-anim-${Math.min(i, 7)}`;
    const isNow = isNowInSlot(slot.t);

    if (slot.c === '__LUNCH__') {
      html += `<div class="slot ${anim}">
        <div class="time-col"><div class="time-start">${t1}</div><div class="time-end">${t2}</div></div>
        <div class="lunch-card"><div class="lunch-dot"></div><div class="lunch-text">lunch break</div></div>
      </div>`;
    } else if (slot.c.startsWith('__WORKSHOP__')) {
      const detail = slot.c.replace('__WORKSHOP__','').split('\n');
      html += `<div class="slot ${anim}">
        <div class="time-col"><div class="time-start">${t1}</div><div class="time-end">${t2}</div></div>
        <div class="workshop-card">
          <div class="workshop-code">Workshop</div>
          <div class="workshop-title">${detail[0] || ''}</div>
          ${detail[1] ? `<div class="workshop-sub">${detail[1]}</div>` : ''}
        </div>
      </div>`;
    } else if (slot.c === '__EXAM__') {
      html += `<div class="slot ${anim}">
        <div class="time-col"><div class="time-start">All</div><div class="time-end">Day</div></div>
        <div class="exam-card">
          <div class="exam-text">End Term Exam</div>
          <div class="exam-sub">PGP BL07 · Term I</div>
        </div>
      </div>`;
    } else {
      const code = getCode(slot.c);
      const col = COLORS[code] || { color:'var(--fob)', bg:'rgba(160,160,184,0.1)', border:'rgba(160,160,184,0.6)' };
      const full = FULL[code] || code;
      const profMatch = slot.c.match(/\(([^)]+)\)/);
      const prof = profMatch ? profMatch[1] : '';
      html += `<div class="slot ${anim}">
        <div class="time-col"><div class="time-start">${t1}</div><div class="time-end">${t2}</div></div>
        <div class="class-card" style="background:${col.bg};border-left-color:${col.border};color:${col.color};">
          <div class="class-code">${code}</div>
          <div class="class-full">${full}</div>
          ${prof ? `<div class="class-prof">${prof}</div>` : ''}
          ${isNow ? '<span class="now-badge">now</span>' : ''}
        </div>
      </div>`;
    }
  });

  document.getElementById('schedule-body').innerHTML = html;
}

function changeDay(dir) {
  idx = Math.max(0, Math.min(DATES.length - 1, idx + dir));
  render();
}

function goToday() {
  idx = findTodayIdx();
  render();
}

idx = findTodayIdx();
render();
