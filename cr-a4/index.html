<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CR-A4">
<meta name="theme-color" content="#f5f5f0">
<title>CR-A4 · PGP BL07 Term I</title>
<style>
:root {
  --bg:#f5f5f0; --surface:#ffffff; --surface2:#efefea;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.14);
  --text:#111111; --muted:#888888; --dim:#bbbbbb;
  --cft:#5b4fcf; --cft-bg:#eeedfb; --cft-b:rgba(91,79,207,0.35);
  --ome:#c94f2a; --ome-bg:#fdf0ec; --ome-b:rgba(201,79,42,0.35);
  --dam:#1a6faa; --dam-bg:#e8f3fb; --dam-b:rgba(26,111,170,0.35);
  --mppo:#b83d7e; --mppo-bg:#fceef6; --mppo-b:rgba(184,61,126,0.35);
  --mm:#9a6a00; --mm-bg:#fdf6e3; --mm-b:rgba(154,106,0,0.35);
  --efaac:#2a7a50; --efaac-bg:#e8f7ef; --efaac-b:rgba(42,122,80,0.35);
  --fob:#555566; --fob-bg:#f0f0f4; --fob-b:rgba(85,85,102,0.35);
  --exam:#b83232; --exam-bg:#fdeaea; --exam-b:rgba(184,50,50,0.35);
  --ws:#6b3fb5; --ws-bg:#f2edfb; --ws-b:rgba(107,63,181,0.35);
  --backdrop-card:rgba(255,255,255,0.6);
}
[data-theme="dark"] {
  --bg:#0e0e10; --surface:#1a1a1d; --surface2:#232327;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --text:#f0f0f0; --muted:#888888; --dim:#555555;
  --cft:#9b8eff; --cft-bg:#2a2540; --cft-b:rgba(155,142,255,0.4);
  --ome:#f49069; --ome-bg:#3d2a22; --ome-b:rgba(244,144,105,0.4);
  --dam:#5fb0e6; --dam-bg:#1f2f3e; --dam-b:rgba(95,176,230,0.4);
  --mppo:#e887b9; --mppo-bg:#3a2530; --mppo-b:rgba(232,135,185,0.4);
  --mm:#d4a546; --mm-bg:#3a2f1a; --mm-b:rgba(212,165,70,0.4);
  --efaac:#5fc88c; --efaac-bg:#1f3329; --efaac-b:rgba(95,200,140,0.4);
  --fob:#9999aa; --fob-bg:#2a2a30; --fob-b:rgba(153,153,170,0.4);
  --exam:#e86d6d; --exam-bg:#3a2222; --exam-b:rgba(232,109,109,0.4);
  --ws:#a78bfa; --ws-bg:#2c2440; --ws-b:rgba(167,139,250,0.4);
  --backdrop-card:rgba(255,255,255,0.04);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { background:var(--bg); color:var(--text); font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; min-height:100vh; overflow-x:hidden; transition:background 0.2s, color 0.2s; }
.app { max-width:430px; margin:0 auto; padding:0 0 5rem; }

header { padding:2.75rem 1.25rem 1.25rem; position:sticky; top:0; background:linear-gradient(to bottom,var(--bg) 85%,transparent); z-index:10; }
.header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.1rem; gap:8px; }
.tag { font-size:10px; font-weight:500; letter-spacing:0.1em; color:var(--muted); text-transform:uppercase; }
.theme-toggle { background:var(--surface); border:1px solid var(--border2); width:32px; height:32px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; color:var(--text); }
.theme-toggle:active { transform:scale(0.92); }
.class-badge { font-size:11px; font-weight:700; letter-spacing:0.08em; color:var(--ome); border:1.5px solid var(--ome-b); padding:4px 10px; border-radius:20px; background:var(--ome-bg); }
.date-display { margin-bottom:1rem; }
.date-day { font-size:24px; font-weight:700; line-height:1.15; letter-spacing:-0.02em; color:var(--text); }
.date-year { font-size:12px; font-weight:400; color:var(--muted); margin-top:3px; }

.sync-row { display:flex; justify-content:space-between; align-items:center; padding:0 1.25rem; margin-bottom:0.75rem; font-size:10px; color:var(--muted); }
.sync-dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:6px; vertical-align:middle; background:var(--dim); }
.sync-dot.ok { background:var(--efaac); }
.sync-dot.err { background:var(--exam); }
.sync-dot.loading { background:var(--mm); animation:pulse 1s ease-in-out infinite; }
.refresh-btn { background:none; border:1px solid var(--border2); color:var(--muted); font-size:10px; font-family:inherit; padding:3px 10px; border-radius:12px; cursor:pointer; letter-spacing:0.05em; }
.refresh-btn:active { background:var(--surface2); }

.tab-bar { display:flex; gap:6px; padding:0 1.25rem; margin-bottom:1.25rem; }
.tab-btn { flex:1; height:36px; border-radius:8px; border:1px solid var(--border2); background:var(--surface); font-family:inherit; font-size:11px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); cursor:pointer; }
.tab-btn.active { background:var(--text); color:var(--bg); border-color:var(--text); }
.tab-btn:active { transform:scale(0.97); }

.day-nav { display:flex; gap:6px; align-items:center; }
.nav-btn { background:var(--surface); border:1px solid var(--border2); color:var(--text); font-size:15px; width:40px; height:36px; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.nav-btn:active { background:var(--surface2); transform:scale(0.96); }
.today-btn { flex:1; background:var(--surface); border:1px solid var(--border2); color:var(--muted); font-family:inherit; font-size:11px; font-weight:500; letter-spacing:0.09em; height:36px; border-radius:8px; cursor:pointer; text-transform:uppercase; }
.today-btn:active { background:var(--surface2); }

.progress-wrap { padding:0 1.25rem; margin-bottom:1.25rem; }
.progress-label { display:flex; justify-content:space-between; font-size:10px; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px; }
.progress-track { height:3px; background:var(--surface2); border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--cft),var(--efaac)); border-radius:2px; transition:width 0.6s ease; }

.stats-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; padding:0 1.25rem; margin-bottom:1.5rem; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 8px; text-align:center; }
.stat-val { font-size:18px; font-weight:700; letter-spacing:-0.02em; line-height:1; }
.stat-val.small { font-size:11px; padding-top:3px; line-height:1.4; letter-spacing:0; font-weight:600; }
.stat-label { font-size:9px; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-top:4px; }

.schedule { padding:0 1.25rem; }
.section-label { font-size:10px; font-weight:600; color:var(--dim); text-transform:uppercase; letter-spacing:0.12em; margin-bottom:0.75rem; }
.slot { display:flex; gap:10px; margin-bottom:7px; align-items:stretch; }
.time-col { width:68px; flex-shrink:0; display:flex; flex-direction:column; align-items:flex-end; padding-top:11px; }
.time-start { font-size:11px; font-weight:600; color:var(--muted); line-height:1; }
.time-ampm { font-size:9px; font-weight:500; color:var(--dim); line-height:1; margin-top:1px; }
.time-end { font-size:10px; color:var(--dim); margin-top:5px; line-height:1; }
.time-end-ampm { font-size:9px; color:var(--dim); line-height:1; margin-top:1px; }
.class-card { flex:1; border-radius:10px; padding:11px 13px; border-left:3px solid transparent; position:relative; animation:slideIn 0.2s ease both; }
@keyframes slideIn { from{opacity:0;transform:translateX(6px)} to{opacity:1;transform:translateX(0)} }
.class-code { font-size:13px; font-weight:700; line-height:1; }
.class-full { font-size:11px; font-weight:400; margin-top:3px; line-height:1.35; opacity:0.75; }
.class-faculty { font-size:10px; font-weight:500; margin-top:5px; opacity:0.55; }
.lunch-card { flex:1; border-radius:10px; padding:10px 13px; background:var(--surface); border:1px dashed var(--border2); display:flex; align-items:center; gap:8px; }
.lunch-dot { width:5px; height:5px; border-radius:50%; background:var(--dim); flex-shrink:0; }
.lunch-text { font-size:11px; font-weight:500; color:var(--muted); letter-spacing:0.03em; text-transform:uppercase; }
.workshop-card { flex:1; border-radius:10px; padding:11px 13px; background:var(--ws-bg); border-left:3px solid var(--ws); }
.workshop-label { font-size:9px; font-weight:700; color:var(--ws); text-transform:uppercase; letter-spacing:0.1em; }
.workshop-title { font-size:12px; font-weight:600; color:var(--ws); margin-top:3px; line-height:1.3; }
.workshop-sub { font-size:10px; color:var(--ws); opacity:0.6; margin-top:4px; }
.exam-card { flex:1; border-radius:10px; padding:13px 14px; background:var(--exam-bg); border-left:3px solid var(--exam); }
.exam-text { font-size:14px; font-weight:700; color:var(--exam); }
.exam-sub { font-size:10px; font-weight:500; color:var(--exam); opacity:0.6; margin-top:4px; text-transform:uppercase; letter-spacing:0.08em; }
.special-card { flex:1; border-radius:10px; padding:11px 13px; background:var(--fob-bg); border-left:3px solid var(--fob-b); }
.special-text { font-size:13px; font-weight:600; color:var(--fob); }
.now-badge { font-size:9px; font-weight:700; letter-spacing:0.1em; background:var(--text); color:var(--bg); padding:2px 7px; border-radius:4px; text-transform:uppercase; position:absolute; top:10px; right:10px; animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.no-class { text-align:center; padding:3rem 0; }
.no-class-icon { font-size:28px; margin-bottom:0.75rem; color:var(--dim); }
.no-class-text { font-size:14px; font-weight:500; color:var(--muted); }
.no-class-sub { font-size:11px; color:var(--dim); margin-top:5px; }

.legend { padding:1.25rem 1.25rem 0; display:flex; flex-wrap:wrap; gap:6px; }
.leg { display:flex; align-items:center; gap:5px; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:4px 9px; }
.leg-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.leg-text { font-size:10px; font-weight:500; color:var(--muted); }

#holidays-view { padding:0 1.25rem; }
.holidays-header { margin-bottom:1.25rem; }
.holidays-title { font-size:22px; font-weight:700; letter-spacing:-0.02em; color:var(--text); }
.holidays-sub { font-size:11px; color:var(--muted); margin-top:4px; }
.holiday-month-label { font-size:10px; font-weight:600; color:var(--dim); text-transform:uppercase; letter-spacing:0.12em; margin:1.25rem 0 0.6rem; }
.holiday-item { display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:11px 13px; margin-bottom:7px; animation:slideIn 0.2s ease both; }
.holiday-date-box { width:42px; flex-shrink:0; text-align:center; }
.holiday-dd { font-size:20px; font-weight:700; line-height:1; color:var(--text); letter-spacing:-0.02em; }
.holiday-dow { font-size:9px; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-top:2px; }
.holiday-divider { width:1px; height:32px; background:var(--border2); flex-shrink:0; }
.holiday-info { flex:1; }
.holiday-name { font-size:13px; font-weight:600; color:var(--text); line-height:1.2; }
.holiday-type { font-size:10px; font-weight:500; margin-top:3px; padding:2px 7px; border-radius:10px; display:inline-block; }
.type-national { background:var(--exam-bg); color:var(--exam); }
.type-free { background:var(--dam-bg); color:var(--dam); }
.type-weekend { background:var(--fob-bg); color:var(--fob); }
.holiday-count-badge { background:var(--efaac-bg); border:1px solid var(--efaac-b); color:var(--efaac); font-size:11px; font-weight:700; padding:5px 12px; border-radius:20px; display:inline-block; margin-top:0.75rem; }

/* EXAMS VIEW */
#exams-view { padding:0 1.25rem; }
.exams-header { margin-bottom:1.25rem; }
.exams-title { font-size:22px; font-weight:700; letter-spacing:-0.02em; color:var(--text); }
.exams-sub { font-size:11px; color:var(--muted); margin-top:4px; }
.exam-day { display:flex; gap:12px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:10px; animation:slideIn 0.2s ease both; }
.exam-day.past { opacity:0.45; }
.exam-day-num { width:36px; height:36px; flex-shrink:0; background:var(--exam-bg); border:1.5px solid var(--exam-b); color:var(--exam); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; }
.exam-day-info { flex:1; }
.exam-day-date { font-size:14px; font-weight:700; color:var(--text); letter-spacing:-0.01em; }
.exam-day-dow { font-size:11px; color:var(--muted); margin-top:2px; }
.exam-day-sessions { display:grid; grid-template-columns:1fr; gap:8px; margin-top:10px; }
.exam-day-sessions.two-col { grid-template-columns:1fr 1fr; }
.exam-session { padding:9px 11px; border-radius:8px; border-left:3px solid var(--exam); background:var(--exam-bg); }
.exam-session-time { font-size:9px; font-weight:700; color:var(--exam); letter-spacing:0.08em; text-transform:uppercase; }
.exam-session-subj { font-size:12px; font-weight:600; color:var(--text); margin-top:4px; line-height:1.3; }
.exam-session-code { font-size:10px; color:var(--muted); margin-top:3px; }
.exam-day-tomorrow { font-size:10px; font-weight:600; color:var(--mm); background:var(--mm-bg); border:1px solid var(--mm-b); padding:2px 8px; border-radius:10px; display:inline-block; margin-top:6px; letter-spacing:0.05em; text-transform:uppercase; }
.exam-day-today { font-size:10px; font-weight:700; color:#fff; background:var(--exam); padding:2px 8px; border-radius:10px; display:inline-block; margin-top:6px; letter-spacing:0.05em; text-transform:uppercase; animation:pulse 2s ease-in-out infinite; }
.exam-summary { font-size:11px; color:var(--muted); text-align:center; margin-top:1rem; padding:0.75rem; background:var(--surface); border-radius:10px; border:1px solid var(--border); }
.exam-summary b { color:var(--text); }

.loading-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:4rem 1.25rem; gap:1rem; }
.spinner { width:28px; height:28px; border:2px solid var(--surface2); border-top-color:var(--cft); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-size:13px; color:var(--muted); }
.error-screen { padding:2rem 1.25rem; text-align:center; }
.error-title { font-size:14px; font-weight:600; color:var(--exam); margin-bottom:6px; }
.error-msg { font-size:12px; color:var(--muted); line-height:1.5; margin-bottom:1rem; }
.retry-btn { background:var(--cft); color:white; border:none; padding:10px 20px; border-radius:8px; font-family:inherit; font-size:12px; font-weight:600; cursor:pointer; }
.cached-banner { background:var(--mm-bg); border:1px solid var(--mm-b); color:var(--mm); border-radius:8px; padding:8px 12px; margin:0 1.25rem 1rem; font-size:11px; text-align:center; }

/* NOTES FEATURE */
.class-notes-btn { display:inline-flex; align-items:center; gap:5px; margin-top:8px; padding:4px 10px; background:var(--backdrop-card); border:1px solid currentColor; border-radius:14px; font-family:inherit; font-size:10px; font-weight:600; color:inherit; cursor:pointer; opacity:0.85; letter-spacing:0.02em; }
.class-notes-btn:active { transform:scale(0.95); opacity:1; }
.class-notes-btn .badge { display:inline-flex; align-items:center; justify-content:center; min-width:16px; height:16px; padding:0 5px; background:currentColor; border-radius:8px; font-size:10px; font-weight:700; }
.class-notes-btn .badge-num { color:#fff; }

.notes-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:100; display:none; align-items:flex-end; justify-content:center; }
.notes-overlay.show { display:flex; animation:fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.notes-sheet { background:var(--bg); width:100%; max-width:430px; max-height:90vh; border-radius:18px 18px 0 0; display:flex; flex-direction:column; animation:slideUp 0.25s cubic-bezier(0.16,1,0.3,1); }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.notes-header { padding:1rem 1.25rem 0.75rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
.notes-title { font-size:18px; font-weight:700; letter-spacing:-0.02em; line-height:1.2; }
.notes-sub { font-size:11px; color:var(--muted); margin-top:3px; }
.notes-close { background:var(--surface); border:1px solid var(--border2); width:32px; height:32px; border-radius:50%; font-size:16px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:var(--text); }
.notes-close:active { background:var(--surface2); }
.notes-body { flex:1; overflow-y:auto; padding:1rem 1.25rem; }
.notes-empty { text-align:center; padding:2rem 1rem; color:var(--muted); font-size:13px; }
.notes-empty-sub { font-size:11px; color:var(--dim); margin-top:5px; }

.session-item { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:10px; animation:slideIn 0.2s ease both; }
.session-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; gap:8px; }
.session-num { font-size:11px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; }
.session-date { font-size:10px; color:var(--muted); }
.session-text { font-size:13px; line-height:1.5; color:var(--text); white-space:pre-wrap; word-wrap:break-word; }
.session-meta-row { display:flex; justify-content:space-between; align-items:center; margin-top:8px; gap:8px; }
.session-saved { font-size:10px; color:var(--dim); font-style:italic; }
.session-actions { display:flex; gap:6px; }
.session-action-btn { background:none; border:1px solid var(--border2); color:var(--muted); font-family:inherit; font-size:10px; font-weight:500; padding:3px 9px; border-radius:6px; cursor:pointer; letter-spacing:0.02em; }
.session-action-btn:active { background:var(--surface2); transform:scale(0.96); }
.session-action-btn.danger { color:var(--exam); border-color:var(--exam-b); }
.session-edit-textarea { width:100%; min-height:70px; padding:8px 10px; border:1px solid var(--border2); border-radius:6px; font-family:inherit; font-size:13px; background:var(--bg); color:var(--text); resize:vertical; box-sizing:border-box; line-height:1.5; }
.session-edit-textarea:focus { outline:none; }
.session-edit-actions { display:flex; gap:6px; margin-top:8px; }
.session-edit-save { flex:1; background:var(--text); color:var(--bg); border:none; padding:7px 12px; border-radius:6px; font-family:inherit; font-size:11px; font-weight:600; cursor:pointer; }
.session-edit-cancel { background:var(--surface); color:var(--muted); border:1px solid var(--border2); padding:7px 12px; border-radius:6px; font-family:inherit; font-size:11px; font-weight:500; cursor:pointer; }

.notes-add { padding:0.75rem 1.25rem 1rem; border-top:1px solid var(--border); background:var(--bg); }
.add-form-label { font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px; }
.add-form-meta { font-size:11px; color:var(--text); margin-bottom:8px; font-weight:500; }
.add-form-textarea { width:100%; min-height:80px; padding:10px 12px; border:1px solid var(--border2); border-radius:8px; font-family:inherit; font-size:13px; background:var(--surface); color:var(--text); resize:vertical; box-sizing:border-box; }
.add-form-textarea:focus { outline:none; border-color:currentColor; }
.add-form-row { display:flex; gap:8px; margin-top:10px; }
.add-save-btn { flex:1; background:var(--text); color:var(--bg); border:none; padding:10px 16px; border-radius:8px; font-family:inherit; font-size:12px; font-weight:600; cursor:pointer; letter-spacing:0.03em; }
.add-save-btn:active { transform:scale(0.97); }
.add-cancel-btn { background:var(--surface); color:var(--muted); border:1px solid var(--border2); padding:10px 16px; border-radius:8px; font-family:inherit; font-size:12px; font-weight:500; cursor:pointer; }
.add-trigger-btn { width:100%; padding:11px 14px; background:var(--surface); border:1px dashed var(--border2); border-radius:10px; font-family:inherit; font-size:12px; font-weight:600; color:var(--muted); cursor:pointer; letter-spacing:0.03em; }
.add-trigger-btn:active { background:var(--surface2); }

.slot-anim-0{animation-delay:0.00s} .slot-anim-1{animation-delay:0.04s} .slot-anim-2{animation-delay:0.08s}

const CACHE_TIME_KEY = 'pgp-bl07-csv-cache-time';

// End Term Exam schedule (PGP BL07 Term I)

// ─────────── THEME ───────────
function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('theme-toggle').textContent = theme==='dark' ? '☀️' : '🌙';
  document.querySelector('meta[name="theme-color"]').setAttribute('content', theme==='dark' ? '#0e0e10' : '#f5f5f0');
}
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  const next = cur==='dark' ? 'light' : 'dark';
  applyTheme(next);
  try { localStorage.setItem(THEME_KEY, next); } catch(e){}
}
(function initTheme(){
  let theme;
  try { theme = localStorage.getItem(THEME_KEY); } catch(e){}

    theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }

})();

// ─────────── STATIC REFS ───────────
const COLORS = {
  'CFT-I': {color:'var(--cft)', bg:'var(--cft-bg)', border:'var(--cft-b)'},
  'OME':   {color:'var(--ome)', bg:'var(--ome-bg)', border:'var(--ome-b)'},

};
const FULL = {
  'CFT-I':'Communication for Transformation-I',
  'OME':'Organization & Market Economics',
  'DAM':'Data Analysis & Modelling',
  'MPPO':'Managing People & Performance in Organizations',
  'MM':'Marketing Management',
  'EFAAC':'Essentials of Financial Accounting, Analysis & Costing',
  'FOB':'Foundations of Business',
};
const FACULTY = {
  'CFT-I':'Prof. Deepa Sethi',
  'OME':'Prof. Shubhasis Dey',
  'DAM':'Prof. Arnab Adhikari',
  'MPPO':'Prof. Roopak Kumar Gupta',
  'MM':'Prof. Atanu Adhikari',
  'FOB':'Prof. Anjana Karumathil',
};
const NATIONAL = {
  '2026-05-01':'Labour Day',
  '2026-05-09':'Rabindra Jayanti',
  '2026-05-24':'Eid al-Adha (Bakrid)',
};

// ─────────── STATE ───────────
let SCHEDULE = [];
let MAP = {};
let DATES = [];
let TERM_S = '2026-04-22';
let TERM_E = '2026-06-05';
let idx = 0;
let currentTab = 'schedule';

// ─────────── CSV PARSING ───────────
function parseCSV(text){
  const rows=[]; let row=[]; let cell=''; let inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(inQ){
      if(c==='"' && n==='"'){ cell+='"'; i++; }
      else if(c==='"'){ inQ=false; }
      else { cell+=c; }
    } else {
      if(c==='"'){ inQ=true; }
      else if(c===','){ row.push(cell); cell=''; }
      else if(c==='\r'){}
      else if(c==='\n'){ row.push(cell); rows.push(row); row=[]; cell=''; }
      else { cell+=c; }
    }
  }
  if(cell.length>0 || row.length>0){ row.push(cell); rows.push(row); }
  return rows;
}

const MONTH_MAP = {
  january:0,february:1,march:2,april:3,may:4,june:5,
  july:6,august:7,september:8,october:9,november:10,december:11,
  jan:0,feb:1,mar:2,apr:3,jun:5,jul:6,aug:7,sep:8,sept:8,oct:9,nov:10,dec:11,
};

function parseDateCell(s){
  if(!s) return null;
  s = s.trim(); if(!s) return null;
  const parts = s.split(',').map(p => p.trim()).filter(Boolean);
  let day, month, year;
  if(parts.length >= 3){
    const dm = parts[1].split(/\s+/);
    day = parseInt(dm[0], 10);
    month = MONTH_MAP[dm[1]?.toLowerCase()];
    year = parseInt(parts[2], 10);
  } else if(parts.length === 2){
    const dm = parts[0].split(/\s+/);
    day = parseInt(dm[0], 10);
    month = MONTH_MAP[dm[1]?.toLowerCase()];
    year = parseInt(parts[1], 10);
  } else {
    const tok = s.split(/\s+/);
    day = parseInt(tok[0], 10);
    month = MONTH_MAP[tok[1]?.toLowerCase()];
    year = parseInt(tok[2], 10);
  }
  if(isNaN(day) || month === undefined || isNaN(year)) return null;
  return `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}

function normalizeTime(s){ if(!s) return ''; return s.replace(/\s+/g,'').trim(); }

function parseScheduleCSV(rows){
  let headerIdx = -1, colTime=-1, colA3=-1, colA4=-1;
  for(let i=0;i<Math.min(rows.length,25);i++){
    const r = (rows[i]||[]).map(c => (c||'').trim());
    const hasTime = r.some(c => c.toLowerCase() === 'time');
    const hasA3   = r.some(c => /^cr[-\s]?a3$/i.test(c));
    const hasA4   = r.some(c => /^cr[-\s]?a4$/i.test(c));
    if(hasTime && (hasA3 || hasA4)){
      headerIdx = i;
      for(let j=0;j<r.length;j++){
        if(r[j].toLowerCase() === 'time') colTime = j;
        if(/^cr[-\s]?a3$/i.test(r[j])) colA3 = j;
        if(/^cr[-\s]?a4$/i.test(r[j])) colA4 = j;
      }
      break;
    }
  }
  if(headerIdx === -1) throw new Error('Could not locate header row.');
  const colDate = colTime > 0 ? colTime - 1 : 0;
  const colSection = SECTION === 'CR-A3' ? colA3 : colA4;
  if(colSection === -1) throw new Error('Could not find ' + SECTION + ' column.');

  let currentDate = null;
  const dateToSlots = {};
  const schedule = [];

  for(let i = headerIdx + 1; i < rows.length; i++){
    const r = rows[i];
    if(!r || !r.length) continue;
    const dateCell = (r[colDate] || '').trim();
    const timeCell = (r[colTime] || '').trim();
    const cellVal  = (r[colSection] || '').trim();

    if(dateCell){
      const parsed = parseDateCell(dateCell);
      if(parsed) currentDate = parsed;
    }
    if(timeCell && /end term exam/i.test(timeCell)){
      if(currentDate){
        if(!dateToSlots[currentDate]) dateToSlots[currentDate] = [];
        dateToSlots[currentDate].push({t:'All day', c:'__EXAM__'});
      }
      continue;
    }
    if(!currentDate || !timeCell) continue;
    const t = normalizeTime(timeCell);
    if(!t) continue;

    let slot = null;
    if(/^lunch/i.test(timeCell.toLowerCase().trim()) || /lunch break/i.test(cellVal)){
      slot = {t, c:'__LUNCH__'};
    } else if(!cellVal){
      continue;
    } else if(/workshop/i.test(cellVal)){
      slot = {t, c:'__WORKSHOP__' + cellVal};
    } else if(/library\s*interaction/i.test(cellVal)){
      slot = {t, c:'__SPECIAL__Library Interaction'};
    } else if(/end term exam/i.test(cellVal)){
      slot = {t:'All day', c:'__EXAM__'};
    } else {
      slot = {t, c:cellVal};
    }
    if(slot){
      if(!dateToSlots[currentDate]) dateToSlots[currentDate] = [];
      dateToSlots[currentDate].push(slot);
    }
  }
  const sortedDates = Object.keys(dateToSlots).sort();
  sortedDates.forEach(d => {
    dateToSlots[d].sort((a,b) => parseTm((a.t.split('-')[0]||'0').trim()) - parseTm((b.t.split('-')[0]||'0').trim()));
    schedule.push({d, slots:dateToSlots[d]});
  });
  return schedule;
}

// ─────────── TIME HELPERS ───────────
function parseTm(s){const[h,m]=(s||'0.0').split('.').map(Number);return (h||0)*60+(m||0);}
function to12(s){
  const[hStr,mStr]=(s||'0.0').split('.');
  let h=parseInt(hStr,10)||0, m=parseInt(mStr||'0',10)||0;
  const ampm=h<12?'AM':'PM';
  if(h===0) h=12; else if(h>12) h-=12;
  return{time:`${h}:${String(m).padStart(2,'0')}`,ampm};
}
function fmtSlot(t){
  if(t==='All day') return {t1:'All',a1:'',t2:'Day',a2:''};
  const p=t.split('-'); if(p.length<2) return {t1:t,a1:'',t2:'',a2:''};
  const s=to12(p[0].trim()), e=to12(p[1].trim());
  return {t1:s.time,a1:s.ampm,t2:e.time,a2:e.ampm};
}
function isNow(t){
  if(t==='All day') return true;
  const p=t.split('-'); if(p.length<2) return false;
  const now=new Date(), cur=now.getHours()*60+now.getMinutes();
  try{ return cur>=parseTm(p[0].trim()) && cur<=parseTm(p[1].trim()); }catch(e){ return false; }
}
function getCode(c){
  if(!c||c.startsWith('__')) return null;
  return c.split('(')[0].trim().replace(/-[AB]$/i,'').trim();
}
function getFaculty(c){
  const code=getCode(c); if(!code) return '';
  if(code==='EFAAC'){
    const m=c.match(/\(([^)]+)\)/);
    if(m){
      if(m[1].toLowerCase().includes('jijo')) return 'Prof. Jijo Lukose';
      if(m[1].toLowerCase().includes('qambar')) return 'Prof. Qambar Abidi';
      return m[1];
    }
    return 'Prof. Jijo Lukose';
  }
  return FACULTY[code] || '';
}
function toDS(dt){return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;}

function computeTermRange(){ if(DATES.length === 0) return; TERM_S = DATES[0]; TERM_E = DATES[DATES.length-1]; }
function todayIdx(){ const t=toDS(new Date()); const i=DATES.findIndex(d=>d>=t); return i===-1?DATES.length-1:i; }
function termPct(){ const n=Date.now(),s=new Date(TERM_S).getTime(),e=new Date(TERM_E).getTime(); if(e<=s) return 0; return Math.max(0,Math.min(100,Math.round((n-s)/(e-s)*100))); }
function daysLeft(){ const t=new Date();t.setHours(0,0,0,0); const e=new Date(TERM_E);e.setHours(0,0,0,0); return Math.max(0,Math.ceil((e-t)/86400000)); }
function countMins(slots){
  let m=0;
  slots.forEach(s=>{
    if(s.c.startsWith('__')) return;
    const p=s.t.split('-'); if(p.length<2) return;
    try{ m+=parseTm(p[1].trim())-parseTm(p[0].trim()); }catch(e){}
  });
  return m;
}
function fmtMins(m){
  const h=Math.floor(m/60), mn=m%60;
  if(h===0) return `${mn} mins`;
  if(mn===0) return `${h} hrs`;
  return `${h} hrs ${mn} mins`;
}

}

function render(){
  if(!DATES.length){
    document.getElementById('main-content').innerHTML = `<div class="error-screen"><div class="error-title">No schedule data</div></div>`;
    return;
  }
  if(!document.getElementById('schedule-view')) renderScheduleShell();

  const ds = DATES[idx];
  const[y,mo,d]=ds.split('-').map(Number);
  const dt=new Date(y,mo-1,d);
  const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

  document.getElementById('date-day').textContent = `${DAYS[dt.getDay()]}, ${String(d).padStart(2,'0')} ${MONTHS[mo-1]}`;
  document.getElementById('date-year').textContent = `${y}`;

  const pct = termPct();
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  const slots = MAP[ds] || [];
  const classes = slots.filter(s=>!s.c.startsWith('__')).length;
  const mins = countMins(slots);
  document.getElementById('stat-classes').textContent = classes;
  document.getElementById('stat-hours').textContent = mins>0 ? fmtMins(mins) : '—';
  document.getElementById('stat-days').textContent = daysLeft();

  if(slots.length === 0){
    document.getElementById('schedule-body').innerHTML = `<div class="no-class"><div class="no-class-icon">—</div><div class="no-class-text">No classes today</div><div class="no-class-sub">Free day · rest or revise</div></div>`;
    return;
  }

  let html='';
  slots.forEach((slot,i)=>{
    const{t1,a1,t2,a2}=fmtSlot(slot.t);
    const anim=`slot-anim-${Math.min(i,7)}`;
    const now=isNow(slot.t);

    if(slot.c==='__LUNCH__'){
      html += `<div class="slot ${anim}">
        <div class="time-col"><div class="time-start">${t1}</div><div class="time-ampm">${a1}</div><div class="time-end">${t2}</div><div class="time-end-ampm">${a2}</div></div>
        <div class="lunch-card"><div class="lunch-dot"></div><div class="lunch-text">Lunch Break</div></div>
      </div>`;
    } else if(slot.c.startsWith('__WORKSHOP__')){
      const det = slot.c.replace('__WORKSHOP__','').split('\n');
      html += `<div class="slot ${anim}">
        <div class="time-col"><div class="time-start">${t1}</div><div class="time-ampm">${a1}</div><div class="time-end">${t2}</div><div class="time-end-ampm">${a2}</div></div>
        <div class="workshop-card"><div class="workshop-label">Workshop</div><div class="workshop-title">${det[0]||''}</div>${det[1]?`<div class="workshop-sub">${det[1]}</div>`:''}</div>
      </div>`;
    } else if(slot.c==='__EXAM__'){
      html += `<div class="slot ${anim}">
        <div class="time-col"><div class="time-start">All</div><div class="time-end">Day</div></div>
        <div class="exam-card"><div class="exam-text">End Term Exam</div><div class="exam-sub">PGP BL07 · Term I</div></div>
      </div>`;
    } else if(slot.c.startsWith('__SPECIAL__')){
      const label = slot.c.replace('__SPECIAL__','');
      html += `<div class="slot ${anim}">
        <div class="time-col"><div class="time-start">${t1}</div><div class="time-ampm">${a1}</div><div class="time-end">${t2}</div><div class="time-end-ampm">${a2}</div></div>
        <div class="special-card"><div class="special-text">${label}</div></div>
      </div>`;
    } else {
      const code = getCode(slot.c);
      const col = COLORS[code] || {color:'var(--fob)',bg:'var(--fob-bg)',border:'var(--fob-b)'};
      const full = FULL[code] || code;
      const fac = getFaculty(slot.c);
      const noteCount = getNoteCount(code);
      html += `<div class="slot ${anim}">
        <div class="time-col"><div class="time-start">${t1}</div><div class="time-ampm">${a1}</div><div class="time-end">${t2}</div><div class="time-end-ampm">${a2}</div></div>
        <div class="class-card" style="background:${col.bg};border-left-color:${col.border};color:${col.color};">
          <div class="class-code">${code}</div>
          <div class="class-full">${full}</div>
          ${fac?`<div class="class-faculty">${fac}</div>`:''}
          <button class="class-notes-btn" onclick="openNotes('${code}','${DATES[idx]}')" style="color:${col.color};">📝 Notes${noteCount>0?` <span class="badge"><span class="badge-num">${noteCount}</span></span>`:''}</button>
          ${now?'<span class="now-badge">Now</span>':''}
        </div>
      </div>`;
    }
  });
  document.getElementById('schedule-body').innerHTML = html;
}

function renderHolidays(){
  const body = document.getElementById('holidays-body');
  if(!body) return;
  if(!DATES.length){ body.innerHTML='<div class="no-class"><div class="no-class-text">Schedule not loaded yet</div></div>'; return; }
  const termStart = DATES[0], termEnd = DATES[DATES.length-1];
  const DOWS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const scheduled = new Set(DATES);
  const free = [];
  const today = toDS(new Date());
  const [sy,sm,sd] = termStart.split('-').map(Number);
  const [ey,em,ed] = termEnd.split('-').map(Number);
  const startDt = new Date(sy, sm-1, sd);
  const endDt = new Date(ey, em-1, ed);
  for(let dt = new Date(startDt); dt <= endDt; dt.setDate(dt.getDate()+1)){
    const ds = toDS(dt);
    if(!scheduled.has(ds)) free.push(new Date(dt));
  }
  if(free.length === 0){ body.innerHTML='<div class="no-class"><div class="no-class-text">No free days</div></div>'; return; }
  const byMonth = {};
  free.forEach(dt => {
    const k = `${dt.getFullYear()}-${String(dt.getMonth()).padStart(2,'0')}`;
    if(!byMonth[k]) byMonth[k] = {label:`${MONTHS[dt.getMonth()]} ${dt.getFullYear()}`, days:[]};
    byMonth[k].days.push(dt);
  });
  let html='';
  Object.keys(byMonth).sort().forEach(k => {
    const g = byMonth[k];
    html += `<div class="holiday-month-label">${g.label}</div>`;
    g.days.forEach((dt,i) => {
      const ds=toDS(dt), dow=dt.getDay(), dd=dt.getDate();
      const past = ds<today;
      const isNH = NATIONAL[ds];
      const isWk = dow===0 || dow===6;
      const tc = isNH?'type-national':isWk?'type-weekend':'type-free';
      const name = isNH?NATIONAL[ds]:isWk?(dow===0?'Sunday':'Saturday'):'Free Day — No Classes';
      const tl = isNH?'Public Holiday':isWk?(dow===0?'Sunday':'Saturday'):'No Classes';
      html += `<div class="holiday-item slot-anim-${Math.min(i,7)}" style="${past?'opacity:0.45':''}">
        <div class="holiday-date-box"><div class="holiday-dd">${String(dd).padStart(2,'0')}</div><div class="holiday-dow">${DOWS[dow]}</div></div>
        <div class="holiday-divider"></div>
        <div class="holiday-info"><div class="holiday-name">${name}</div><span class="holiday-type ${tc}">${tl}</span></div>
      </div>`;
    });
  });
  html += `<div style="padding:0.75rem 0 0.5rem"><span class="holiday-count-badge">${free.length} free days in Term I</span></div>`;
  body.innerHTML = html;
}

function renderExams(){
  const body = document.getElementById('exams-body');
  if(!body) return;
  const today = toDS(new Date());
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1); const tomorrowStr = toDS(tomorrow);
  const DOWS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

  let html = '';
  EXAMS.forEach((exam, i) => {
    const [y,mo,d] = exam.date.split('-').map(Number);
    const dt = new Date(y, mo-1, d);
    const past = exam.date < today;
    const isToday = exam.date === today;
    const isTomorrow = exam.date === tomorrowStr;
    const slNo = String(i+1).padStart(2, '0');

    let badge = '';
    if(isToday) badge = '<div class="exam-day-today">Today</div>';
    else if(isTomorrow) badge = '<div class="exam-day-tomorrow">Tomorrow</div>';

    const sessions = [];
    if(exam.forenoon){
      sessions.push(`<div class="exam-session">
        <div class="exam-session-time">Forenoon</div>
        <div class="exam-session-subj">${exam.forenoon.subj}</div>
        <div class="exam-session-code">${exam.forenoon.code}</div>
      </div>`);
    }
    if(exam.afternoon){
      sessions.push(`<div class="exam-session">
        <div class="exam-session-time">Afternoon</div>
        <div class="exam-session-subj">${exam.afternoon.subj}</div>
        <div class="exam-session-code">${exam.afternoon.code}</div>
      </div>`);
    }

    html += `<div class="exam-day ${past?'past':''} slot-anim-${Math.min(i,7)}">
      <div class="exam-day-num">${slNo}</div>
      <div class="exam-day-info">
        <div class="exam-day-date">${String(d).padStart(2,'0')} ${MONTHS[mo-1]} ${y}</div>
        <div class="exam-day-dow">${DOWS[dt.getDay()]}</div>
        ${badge}
        <div class="exam-day-sessions ${sessions.length===2?'two-col':''}">${sessions.join('')}</div>
      </div>
    </div>`;
  });

  // Summary
  const upcoming = EXAMS.filter(e => e.date >= today).length;
  const examFromToday = EXAMS.find(e => e.date >= today);
  let summaryText = '';
  if(examFromToday){
    const [y,mo,d] = examFromToday.date.split('-').map(Number);
    const target = new Date(y, mo-1, d); target.setHours(0,0,0,0);
    const todayDt = new Date(); todayDt.setHours(0,0,0,0);
    const diff = Math.round((target - todayDt) / 86400000);
    if(diff === 0) summaryText = `<b>${examFromToday.forenoon.code}${examFromToday.afternoon ? ' & ' + examFromToday.afternoon.code : ''}</b> exam today`;
    else if(diff === 1) summaryText = `Next exam <b>tomorrow</b> · ${examFromToday.forenoon.code}${examFromToday.afternoon ? ' & ' + examFromToday.afternoon.code : ''}`;
    else summaryText = `Next exam in <b>${diff} days</b> · ${examFromToday.forenoon.code}${examFromToday.afternoon ? ' & ' + examFromToday.afternoon.code : ''}`;
  } else {
    summaryText = `<b>All exams completed</b>`;
  }
  html += `<div class="exam-summary">${summaryText}</div>`;
  body.innerHTML = html;
}

function switchTab(tab){
  currentTab = tab;
  ['schedule','holidays','exams'].forEach(t => {
    const btn = document.getElementById('tab-' + t);
    if(btn) btn.classList.toggle('active', tab===t);
  });
  ['schedule','holidays','exams'].forEach(t => {
    const v = document.getElementById(t + '-view');
    if(v) v.style.display = tab===t ? '' : 'none';
  });
  const hd=document.getElementById('header-date'), dn=document.getElementById('day-nav-row');
  if(hd) hd.style.display = tab==='schedule' ? '' : 'none';
  if(dn) dn.style.display = tab==='schedule' ? '' : 'none';
  if(tab==='holidays') renderHolidays();
  if(tab==='exams') renderExams();
}

function changeDay(dir){ idx=Math.max(0,Math.min(DATES.length-1,idx+dir)); render(); }
function goToday(){ idx=todayIdx(); render(); }

// ─────────── SYNC STATUS ───────────
function setSyncStatus(state, text){
  const dot = document.getElementById('sync-dot'), txt = document.getElementById('sync-text');
  if(dot) dot.className = 'sync-dot ' + state;
  if(txt) txt.textContent = text;
}
function fmtTimeAgo(ms){
  const s = Math.floor((Date.now()-ms)/1000);
  if(s<60) return 'just now';
  if(s<3600) return `${Math.floor(s/60)}m ago`;
  if(s<86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}

// ─────────── LOAD CSV ───────────
async function fetchStrategy(name, url){
  const res = await fetch(url, {cache:'no-store', redirect:'follow'});
  if(!res.ok) throw new Error(`${name}: HTTP ${res.status}`);
  const text = await res.text();
  if(!text || text.length < 20) throw new Error(`${name}: empty response`);
  if(!text.includes(',') && !text.toLowerCase().includes('time')) throw new Error(`${name}: response does not look like CSV`);
  return text;
}
async function tryAllFetches(){
  const bust = '_t=' + Date.now();
  const sep = CSV_URL.includes('?') ? '&' : '?';
  const directUrl = CSV_URL + sep + bust;
  const strategies = [
    ['direct', directUrl],
    ['allorigins', 'https://api.allorigins.win/raw?url=' + encodeURIComponent(directUrl)],
    ['corsproxy.io', 'https://corsproxy.io/?' + encodeURIComponent(directUrl)],
    ['thingproxy', 'https://thingproxy.freeboard.io/fetch/' + directUrl],
  ];
  const errors = [];
  for(const [name, url] of strategies){
    try {
      const text = await fetchStrategy(name, url);
      return {text, via:name};
    } catch(e){ errors.push(`${name}: ${e.message}`); }
  }
  throw new Error('All fetch strategies failed:\n' + errors.join('\n'));
}

async function loadCSV(forceReload=false){
  setSyncStatus('loading','Syncing…');
  document.getElementById('cached-banner').style.display='none';

  try {
    const {text, via} = await tryAllFetches();
    const rows = parseCSV(text);
    const schedule = parseScheduleCSV(rows);
    if(!schedule.length) throw new Error('CSV fetched but no schedule rows parsed.');
    try { localStorage.setItem(CACHE_KEY, text); localStorage.setItem(CACHE_TIME_KEY, String(Date.now())); } catch(e) {}
    SCHEDULE = schedule;
    MAP = {}; SCHEDULE.forEach(d => MAP[d.d] = d.slots);
    DATES = SCHEDULE.map(d => d.d);
    computeTermRange();
    idx = todayIdx();
    setSyncStatus('ok', via === 'direct' ? 'Live · just synced' : `Live · via ${via}`);
    renderScheduleShell();
    if(currentTab==='holidays') switchTab('holidays');
    else if(currentTab==='exams') switchTab('exams');
    else render();
    return;
  } catch(err){ console.warn('All CSV fetches failed:', err); }

  // cache fallback
  try {
    const cached = localStorage.getItem(CACHE_KEY);
    const cachedTime = parseInt(localStorage.getItem(CACHE_TIME_KEY)||'0',10);
    if(cached){
      const rows = parseCSV(cached);
      const schedule = parseScheduleCSV(rows);
      if(schedule.length){
        SCHEDULE = schedule;
        MAP = {}; SCHEDULE.forEach(d => MAP[d.d] = d.slots);
        DATES = SCHEDULE.map(d => d.d);
        computeTermRange();
        idx = todayIdx();
        setSyncStatus('err', `Offline · cached ${fmtTimeAgo(cachedTime)}`);
        document.getElementById('cached-banner').style.display='block';
        document.getElementById('cached-banner').textContent = `⚠ Showing cached data from ${fmtTimeAgo(cachedTime)}.`;
        renderScheduleShell();
        if(currentTab==='holidays') switchTab('holidays');
        else if(currentTab==='exams') switchTab('exams');
        else render();
        return;
      }
    }
  } catch(e){}

  setSyncStatus('err','Sync failed');
  document.getElementById('main-content').innerHTML = `
    <div class="error-screen">
      <div class="error-title">Couldn't load schedule</div>
      <div class="error-msg">Could not reach the Google Sheet.</div>
      <button class="retry-btn" onclick="loadCSV(true)">Retry</button>
    </div>`;
}

// ─────────── NOTES (preserves existing localStorage data) ───────────
const NOTES_KEY_PREFIX = 'pgp-bl07-notes-' + SECTION + '-';
let activeNotesCode = null;
let activeNotesDate = null;

function loadNotes(code){
  try {
    const raw = localStorage.getItem(NOTES_KEY_PREFIX + code);
    if(!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch(e){ return []; }
}
function saveNotes(code, notes){
  try { localStorage.setItem(NOTES_KEY_PREFIX + code, JSON.stringify(notes)); return true; }
  catch(e){ alert('Could not save note (storage full?)'); return false; }
}
function getNoteCount(code){ return loadNotes(code).length; }

function findNextClassDate(code, fromDate){
  for(const day of SCHEDULE){
    if(day.d <= fromDate) continue;
    for(const s of day.slots){
      if(s.c.startsWith('__')) continue;
      if(getCode(s.c) === code) return day.d;
    }
  }
  return null;
}
function findSessionNumber(code, onDate){
  let count = 0;
  for(const day of SCHEDULE){
    let counted = false;
    for(const s of day.slots){
      if(s.c.startsWith('__')) continue;
      if(getCode(s.c) === code && !counted){ count++; counted = true; }
    }
    if(day.d === onDate && counted) return count;
    if(day.d > onDate) break;
  }
  return count > 0 ? count : 1;
}
function fmtNiceDate(ds){
  const [y,mo,d] = ds.split('-').map(Number);
  const dt = new Date(y, mo-1, d);
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${DAYS[dt.getDay()]}, ${d} ${MONTHS[mo-1]}`;
}
function fmtDaysFromNow(ds){
  const today = new Date(); today.setHours(0,0,0,0);
  const [y,mo,d] = ds.split('-').map(Number);
  const target = new Date(y, mo-1, d); target.setHours(0,0,0,0);
  const diff = Math.round((target-today)/86400000);
  if(diff===0) return 'today';
  if(diff===1) return 'tomorrow';
  if(diff<0) return `${-diff}d ago`;
  return `in ${diff} days`;
}

function openNotes(code, currentDate){
  activeNotesCode = code; activeNotesDate = currentDate;
  document.getElementById('notes-overlay').classList.add('show');
  renderNotesContent();
  document.body.style.overflow = 'hidden';
}
function closeNotes(){
  document.getElementById('notes-overlay').classList.remove('show');
  document.body.style.overflow = '';
  activeNotesCode = null; activeNotesDate = null;
  if(DATES.length) render();
}
function closeNotesIfBackdrop(e){ if(e.target.id === 'notes-overlay') closeNotes(); }

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

function renderNotesContent(){
  const code = activeNotesCode, date = activeNotesDate;
  const fullName = FULL[code] || code;
  const faculty = FACULTY[code] || (code==='EFAAC' ? 'Prof. Jijo Lukose / Prof. Qambar Abidi' : '');
  document.getElementById('notes-title').textContent = `${code} — Course Journal`;
  document.getElementById('notes-sub').textContent = fullName + (faculty ? ' · ' + faculty : '');

  const notes = loadNotes(code);
  const body = document.getElementById('notes-body');
  if(notes.length === 0){
    body.innerHTML = `<div class="notes-empty">No sessions logged yet<div class="notes-empty-sub">Add your first note below to start tracking</div></div>`;
  } else {
    const indexed = notes.map((n,i)=>({...n, _i:i}));
    indexed.sort((a,b) => (b.date+String(b.session).padStart(3,'0')+b.savedAt).localeCompare(a.date+String(a.session).padStart(3,'0')+a.savedAt));
    let html = '';
    indexed.forEach((n,renderIdx) => {
      const col = COLORS[code] || {color:'var(--fob)'};
      const savedLabel = n.savedAt ? `Saved ${new Date(n.savedAt).toLocaleString('en-IN', {day:'numeric',month:'short',hour:'numeric',minute:'2-digit',hour12:true})}${n.editedAt ? ` · edited ${new Date(n.editedAt).toLocaleString('en-IN', {day:'numeric',month:'short',hour:'numeric',minute:'2-digit',hour12:true})}` : ''}` : '';
      html += `<div class="session-item" id="session-${n._i}" style="border-left:3px solid ${col.color};animation-delay:${renderIdx*0.04}s">
        <div class="session-head">
          <div class="session-num" style="color:${col.color}">Session ${n.session}</div>
          <div class="session-date">${fmtNiceDate(n.date)}</div>
        </div>
        <div class="session-text">${escapeHtml(n.text)}</div>
        <div class="session-meta-row">
          <div class="session-saved">${savedLabel}</div>
          <div class="session-actions">
            <button class="session-action-btn" onclick="editSession(${n._i})">Edit</button>
            <button class="session-action-btn danger" onclick="deleteSession(${n._i})">Delete</button>
          </div>
        </div>
      </div>`;
    });
    body.innerHTML = html;
  }
  renderAddArea();
}

function editSession(noteIdx){
  const code = activeNotesCode;
  const notes = loadNotes(code);
  const n = notes[noteIdx];
  if(!n) return;
  const col = COLORS[code] || {color:'var(--fob)'};
  const sessionEl = document.getElementById('session-' + noteIdx);
  if(!sessionEl) return;
  sessionEl.innerHTML = `
    <div class="session-head">
      <div class="session-num" style="color:${col.color}">Session ${n.session}</div>
      <div class="session-date">${fmtNiceDate(n.date)}</div>
    </div>
    <textarea class="session-edit-textarea" id="edit-textarea-${noteIdx}" style="border-color:${col.color}">${escapeHtml(n.text)}</textarea>
    <div class="session-edit-actions">
      <button class="session-edit-cancel" onclick="renderNotesContent()">Cancel</button>
      <button class="session-edit-save" onclick="saveEditedSession(${noteIdx})">Save changes</button>
    </div>`;
  const ta = document.getElementById('edit-textarea-' + noteIdx);
  ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length);
}
function saveEditedSession(noteIdx){
  const text = document.getElementById('edit-textarea-' + noteIdx).value.trim();
  if(!text){ alert('Note cannot be empty'); return; }
  const code = activeNotesCode;
  const notes = loadNotes(code);
  if(!notes[noteIdx]) return;
  notes[noteIdx].text = text;
  notes[noteIdx].editedAt = Date.now();
  if(saveNotes(code, notes)) renderNotesContent();
}
function deleteSession(noteIdx){
  const code = activeNotesCode;
  const notes = loadNotes(code);
  if(!notes[noteIdx]) return;
  if(!confirm(`Delete this note?\n\nSession ${notes[noteIdx].session} · ${fmtNiceDate(notes[noteIdx].date)}\n\nThis cannot be undone.`)) return;
  notes.splice(noteIdx, 1);
  if(saveNotes(code, notes)) renderNotesContent();
}

function renderAddArea(){
  const code = activeNotesCode, date = activeNotesDate;
  const session = findSessionNumber(code, date);
  const nextDate = findNextClassDate(code, date);
  const col = COLORS[code] || {color:'var(--fob)'};
  document.getElementById('notes-add').innerHTML = `
    <div class="add-form-label">Today · Session ${session}</div>
    <div class="add-form-meta" style="color:${col.color}">
      ${fmtNiceDate(date)}${nextDate ? ` &nbsp;·&nbsp; <span style="color:var(--muted);font-weight:400">Next ${code}: ${fmtNiceDate(nextDate)} (${fmtDaysFromNow(nextDate)})</span>` : ' &nbsp;·&nbsp; <span style="color:var(--muted);font-weight:400">No more classes scheduled</span>'}
    </div>
    <button class="add-trigger-btn" onclick="showAddForm()">+ Add note for this session</button>
  `;
}
function showAddForm(){
  const code = activeNotesCode, date = activeNotesDate;
  const session = findSessionNumber(code, date);
  const nextDate = findNextClassDate(code, date);
  const col = COLORS[code] || {color:'var(--fob)'};
  document.getElementById('notes-add').innerHTML = `
    <div class="add-form-label">New entry · Session ${session}</div>
    <div class="add-form-meta" style="color:${col.color}">
      ${fmtNiceDate(date)}${nextDate ? ` &nbsp;·&nbsp; <span style="color:var(--muted);font-weight:400">Prep for next class: ${fmtNiceDate(nextDate)} (${fmtDaysFromNow(nextDate)})</span>` : ''}
    </div>
    <textarea class="add-form-textarea" id="add-textarea" placeholder="Today's classwork, homework, prep for next session..." style="border-color:${col.color}"></textarea>
    <div class="add-form-row">
      <button class="add-cancel-btn" onclick="renderAddArea()">Cancel</button>
      <button class="add-save-btn" onclick="saveNewNote()">Save note</button>
    </div>`;
  setTimeout(() => document.getElementById('add-textarea').focus(), 50);
}
function saveNewNote(){
  const text = document.getElementById('add-textarea').value.trim();
  if(!text){ alert('Please type something before saving'); return; }
  const code = activeNotesCode, date = activeNotesDate;
  const session = findSessionNumber(code, date);
  const notes = loadNotes(code);
  notes.push({session, date, text, savedAt: Date.now()});
  if(saveNotes(code, notes)) renderNotesContent();
}

loadCSV();
</script>
